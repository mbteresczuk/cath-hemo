services:
  - type: web
    name: cath-hemo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false   # you set this manually in Render dashboard
    autoDeploy: true
