services:
  - type: web
    name: cath-hemo
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
    autoDeploy: true
